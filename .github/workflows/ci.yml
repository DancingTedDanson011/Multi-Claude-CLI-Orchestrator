name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: build + typecheck (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.10'

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # build runs `tsc -p tsconfig.json` per package, which both typechecks
      # AND emits .d.ts. Composite project references require the producer's
      # dist to exist before consumers can typecheck, so we do build only
      # (a separate `--noEmit` typecheck step would fail with TS2307 before
      # shared has emitted).
      - name: build
        run: pnpm -r build

  smoke:
    name: smoke (end-to-end)
    runs-on: windows-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.10'

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm -r build

      - name: probe node-pty + cb startup
        shell: pwsh
        run: |
          Write-Host "=== Node + arch ==="
          node -p "process.version + ' / ' + process.platform + ' / ' + process.arch"

          Write-Host ""
          Write-Host "=== pnpm install layout ==="
          Write-Host "root node_modules existence:"
          Test-Path 'node_modules' | Out-Host
          Write-Host "packages/cb/node_modules existence:"
          Test-Path 'packages/cb/node_modules' | Out-Host
          Write-Host "node-pty in packages/cb/node_modules:"
          Test-Path 'packages/cb/node_modules/node-pty' | Out-Host
          Write-Host "node-pty prebuilds:"
          if (Test-Path 'packages/cb/node_modules/node-pty/prebuilds') {
            Get-ChildItem 'packages/cb/node_modules/node-pty/prebuilds' -Recurse | Format-Table FullName -AutoSize | Out-Host
          } else {
            Write-Host "  (prebuilds dir does not exist)"
          }

          Write-Host ""
          Write-Host "=== node-pty resolve FROM packages/cb ==="
          Push-Location packages/cb
          node -e "try { const pty = require('node-pty'); console.log('OK keys:', Object.keys(pty).join(',')); } catch (e) { console.error('FAIL:', e.stack); process.exit(1); }"
          Pop-Location

          Write-Host ""
          Write-Host "=== node-pty PTY spawn test FROM packages/cb ==="
          Push-Location packages/cb
          node -e "const pty = require('node-pty'); const c = pty.spawn('pwsh.exe', ['-NoLogo','-Command','Write-Host PROBE_OK; exit 0'], { cols:80, rows:24 }); let out=''; c.onData(d=>out+=d); c.onExit(e=>{ console.log('exit', JSON.stringify(e)); console.log('output:', JSON.stringify(out)); process.exit(out.includes('PROBE_OK')?0:1); });"
          Pop-Location

          Write-Host ""
          Write-Host "=== cb --no-bridge end-to-end ==="
          node packages/cb/dist/index.js --no-bridge --label probe pwsh.exe -NoLogo -Command "Write-Host CB_PROBE_OK; exit 0" 2>&1 | Tee-Object -Variable cbOut
          Write-Host "exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "cb --no-bridge failed; aborting smoke"
            exit 1
          }

      - name: smoke test
        shell: pwsh
        run: |
          $env:BRIDGE_TEST_CI = "1"
          pnpm test:smoke

      - name: stage bridge logs for upload
        if: failure()
        shell: pwsh
        run: |
          $src = Join-Path $env:USERPROFILE '.bridge-clis'
          $dst = Join-Path $env:GITHUB_WORKSPACE 'bridge-logs-artifact'
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          if (Test-Path $src) { Copy-Item -Path (Join-Path $src '*') -Destination $dst -Recurse -Force -ErrorAction SilentlyContinue }
          else { Set-Content -Path (Join-Path $dst 'no-bridge-dir.txt') -Value 'bridge directory did not exist' }

      - name: upload daemon logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-logs
          path: bridge-logs-artifact/**
          if-no-files-found: ignore

      - name: dump bridge logs to console on failure
        if: failure()
        shell: pwsh
        run: |
          $bd = Join-Path $env:USERPROFILE '.bridge-clis'
          Write-Host "=== bridge dir: $bd ==="
          if (Test-Path $bd) {
            Get-ChildItem $bd | Format-Table -AutoSize | Out-Host
            foreach ($f in @('cb.log','bridged.log','bridge-mcp.log')) {
              $p = Join-Path $bd $f
              if (Test-Path $p) {
                Write-Host ""
                Write-Host "--- $f ---"
                Get-Content $p -Tail 60
              } else {
                Write-Host "$f : not present"
              }
            }
          } else {
            Write-Host "(directory does not exist - daemon never started)"
          }
