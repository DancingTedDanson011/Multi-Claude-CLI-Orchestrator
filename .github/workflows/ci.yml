name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: build + typecheck (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.10'

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # build runs `tsc -p tsconfig.json` per package, which both typechecks
      # AND emits .d.ts. Composite project references require the producer's
      # dist to exist before consumers can typecheck, so we do build only
      # (a separate `--noEmit` typecheck step would fail with TS2307 before
      # shared has emitted).
      - name: build
        run: pnpm -r build

  smoke:
    name: smoke (end-to-end)
    runs-on: windows-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.10'

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm -r build

      - name: smoke test
        shell: pwsh
        run: |
          $env:BRIDGE_TEST_CI = "1"
          pnpm test:smoke

      - name: upload daemon logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-logs
          path: |
            ~/.bridge-clis/*.log
            ~/.bridge-clis/sessions.json
          if-no-files-found: ignore
